<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D6FFF"/>
      <stop offset="100%" stop-color="#1a4fd8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Printer body -->
  <rect x="7" y="13" width="18" height="11" rx="2" fill="white" opacity="0.95"/>
  <!-- Printer tray top -->
  <rect x="10" y="9" width="12" height="5" rx="1.5" fill="white" opacity="0.7"/>
  <!-- Paper output -->
  <rect x="10" y="20" width="12" height="6" rx="1" fill="#0A0F1E" opacity="0.15"/>
  <rect x="12" y="22" width="8" height="1.2" rx="0.6" fill="white" opacity="0.8"/>
  <rect x="12" y="24.2" width="6" height="1" rx="0.5" fill="white" opacity="0.5"/>
  <!-- Printer button dot -->
  <circle cx="21.5" cy="17" r="1.2" fill="#F5C518"/>
